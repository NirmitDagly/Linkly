name: Release SPM Package

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          echo "latest=${LATEST:-v0.0.0}" >> $GITHUB_OUTPUT
          echo "Latest tag found: ${LATEST:-v0.0.0}"

      - name: Bump version from commit message
        id: bump
        run: |
          VERSION="${{ steps.get_tag.outputs.latest }}"
          VERSION_NUM="${VERSION#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NUM"
          COMMIT_MSG=$(git log -1 --pretty=%B)

          if echo "$COMMIT_MSG" | grep -qi "\[major\]"; then
            NEW="v$((MAJOR + 1)).0.0"
          elif echo "$COMMIT_MSG" | grep -qi "\[minor\]"; then
            NEW="v${MAJOR}.$((MINOR + 1)).0"
          else
            NEW="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "new_version=${NEW}" >> $GITHUB_OUTPUT
          echo "Version bump: ${VERSION} → ${NEW}"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.bump.outputs.new_version }}
          git push origin ${{ steps.bump.outputs.new_version }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.bump.outputs.new_version }} \
            --title "${{ steps.bump.outputs.new_version }}" \
            --generate-notes
